services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        USR: ${USR:-${USER:-appuser}}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
      SERVER_NAME: :80
    working_dir: /app
    volumes:
      - ./:/app
      - caddy_data:/data
      - caddy_config:/config
    ports:
      # Selalu auto-pick port host kosong (anti bentrok).
      - target: 80
        published: "0"
        protocol: tcp
      - target: 5173
        published: "0"
        protocol: tcp
    depends_on:
      - db
      - redis
    networks:
      - laravel-network
    command: ["/usr/local/bin/start-laravel.sh"]

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - target: 5432
        published: "0"
        protocol: tcp
    networks:
      - laravel-network
    # Optimasi RAM & Performa Postgres
    command: postgres -c shared_buffers=128MB -c max_connections=50 -c work_mem=4MB -c maintenance_work_mem=16MB
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - target: 6379
        published: "0"
        protocol: tcp
    networks:
      - laravel-network
    # Optimasi RAM Redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  laravel-network:
    driver: bridge

volumes:
  db-data:
  caddy_data:
  caddy_config:
